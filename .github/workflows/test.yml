name: Build and Test
on:
  - main.go

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Go environment
        uses: actions/setup-go@v3
        with:
          go-version: 1.19

      - name: Install dependencies
        run: go mod download

      - name: Run build
        run: go build -o main

      - name: Run test (always succeeds)
        run: echo "Test succeeded!"
        continue-on-error: false
